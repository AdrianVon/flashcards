<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flashcards</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #23232f;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #7878a0;
    --accent: #7c6af7;
    --accent-hover: #9081fa;
    --green: #22c55e;
    --green-hover: #16a34a;
    --red: #ef4444;
    --red-hover: #dc2626;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  .container { max-width: 720px; margin: 0 auto; padding: 0 16px; width: 100%; }

  /* Navbar */
  .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 0; }
  .navbar-inner { display: flex; align-items: center; justify-content: space-between; }
  .navbar-brand { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .navbar-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
  .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover:not(:disabled) { background: var(--green-hover); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover:not(:disabled) { background: var(--red-hover); }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover:not(:disabled) { color: var(--text); }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-lg { padding: 13px 28px; font-size: 16px; }
  .btn-full { width: 100%; justify-content: center; }

  /* Cards / Surfaces */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .card + .card { margin-top: 12px; }

  /* Home screen */
  .home-hero { text-align: center; padding: 48px 0 32px; }
  .home-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .home-hero p { color: var(--text-muted); font-size: 16px; }
  .home-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
  .home-stat { display: flex; align-items: center; justify-content: space-between; }
  .home-stat-label { color: var(--text-muted); font-size: 14px; }
  .home-stat-value { font-weight: 700; font-size: 18px; }

  /* Flashcard */
  .fc-scene { perspective: 1000px; width: 100%; max-width: 560px; margin: 0 auto; }
  .fc-card-wrap { position: relative; width: 100%; padding-top: 56%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
  .fc-card-wrap.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; padding: 32px; border: 1.5px solid var(--border); user-select: none; }
  .fc-front { background: var(--surface); }
  .fc-back { background: var(--surface2); transform: rotateY(180deg); }
  .fc-text { font-size: clamp(16px, 3vw, 24px); font-weight: 600; text-align: center; line-height: 1.5; }
  .fc-label { position: absolute; top: 12px; left: 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
  .fc-counter { position: absolute; top: 12px; right: 16px; font-size: 12px; color: var(--text-muted); }

  /* Study */
  .study-wrap { padding: 24px 0; }
  .study-progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 24px; }
  .study-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .study-controls { display: flex; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .study-hint { text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 16px; }
  .study-stats { display: flex; gap: 16px; justify-content: center; font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
  .study-stats .correct { color: var(--green); font-weight: 700; }
  .study-stats .incorrect { color: var(--red); font-weight: 700; }

  /* Session complete */
  .complete-wrap { text-align: center; padding: 48px 0; }
  .complete-wrap h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .complete-wrap p { color: var(--text-muted); margin-bottom: 24px; }
  .complete-stats { display: flex; gap: 32px; justify-content: center; margin-bottom: 32px; }
  .complete-stat { text-align: center; }
  .complete-stat-val { font-size: 36px; font-weight: 800; }
  .complete-stat-lbl { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .complete-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .missed-list { margin-top: 24px; text-align: left; }
  .missed-list h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .missed-item { background: var(--surface2); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
  .missed-item .q { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .missed-item .a { font-size: 13px; color: var(--text-muted); }

  /* Quiz */
  .quiz-wrap { padding: 24px 0; }
  .quiz-question { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 32px; text-align: center; margin-bottom: 20px; }
  .quiz-question p { font-size: 20px; font-weight: 600; line-height: 1.5; }
  .quiz-question small { color: var(--text-muted); font-size: 12px; display: block; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .quiz-choices { display: flex; flex-direction: column; gap: 10px; }
  .quiz-choice { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 14px 20px; text-align: left; font-size: 15px; cursor: pointer; transition: all 0.15s; font-weight: 500; color: var(--text); }
  .quiz-choice:hover:not(:disabled) { border-color: var(--accent); }
  .quiz-choice.correct { border-color: var(--green); background: rgba(34,197,94,0.1); color: var(--green); }
  .quiz-choice.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }
  .quiz-choice:disabled { cursor: default; }
  .quiz-feedback { text-align: center; margin-top: 16px; font-weight: 700; font-size: 16px; }
  .quiz-feedback.correct { color: var(--green); }
  .quiz-feedback.wrong { color: var(--red); }
  .quiz-next { text-align: center; margin-top: 16px; }

  /* Admin */
  .admin-wrap { padding: 24px 0; }
  .admin-form { display: flex; flex-direction: column; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 15px; font-family: inherit; transition: border-color 0.15s; resize: vertical; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .card-list { display: flex; flex-direction: column; gap: 8px; margin-top: 24px; }
  .card-item { background: var(--surface2); border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .card-item-text { flex: 1; min-width: 0; }
  .card-item-front { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-item-back { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* Login */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
  .login-box { width: 100%; max-width: 360px; }
  .login-box h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }

  /* Misc */
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
  .badge-accent { background: rgba(124,106,247,0.15); color: var(--accent); }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .mt-4 { margin-top: 16px; }
  .mt-8 { margin-top: 32px; }
  .mb-4 { margin-bottom: 16px; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .animate-in { animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Confirm modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; max-width: 400px; width: 100%; }
  .modal-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .modal-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .alert { border-radius: 8px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Storage Keys ────────────────────────────────────────────────────────────
const STORAGE_KEYS = {
  cards: 'fc_cards_v1',
  progress: 'fc_progress_v1',
  adminToken: 'fc_admin_token',
};

const ADMIN_PASSWORD = 'admin123';

// ─── GitHub Card Sync ─────────────────────────────────────────────────────────
const REPO = 'AdrianVon/flashcards';
const CARDS_FILE = 'cards.json';
const CARDS_RAW_URL = `https://raw.githubusercontent.com/${REPO}/main/${CARDS_FILE}`;
const GITHUB_API_URL = `https://api.github.com/repos/${REPO}/contents/${CARDS_FILE}`;

async function fetchRemoteCards() {
  try {
    const r = await fetch(CARDS_RAW_URL + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function pushCardsToGitHub(newCards, token) {
  const r = await fetch(GITHUB_API_URL, {
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error('Failed to read cards.json from GitHub (status ' + r.status + ')');
  const file = await r.json();
  const sha = file.sha;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(newCards, null, 2))));
  const put = await fetch(GITHUB_API_URL, {
    method: 'PUT',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Update cards via admin panel', content, sha })
  });
  if (!put.ok) {
    const err = await put.json().catch(() => ({}));
    throw new Error(err.message || 'GitHub API error ' + put.status);
  }
}

// ─── Default Cards ────────────────────────────────────────────────────────────
const DEFAULT_CARDS = [];

// ─── SM-2 Spaced Repetition (simplified) ─────────────────────────────────────
function getNextReview(prev, quality) {
  const now = Date.now();
  if (!prev) {
    return { interval: quality >= 2 ? 1 : 0, easeFactor: 2.5, nextReview: now, reps: quality >= 2 ? 1 : 0, lastQuality: quality };
  }
  let { interval, easeFactor, reps } = prev;
  if (quality < 2) {
    interval = 0; reps = 0;
  } else {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * easeFactor);
    reps += 1;
    easeFactor = Math.max(1.3, easeFactor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  }
  return { interval, easeFactor, nextReview: now + interval * 86400000, reps, lastQuality: quality };
}

function isDue(progressEntry) {
  if (!progressEntry) return true;
  return Date.now() >= progressEntry.nextReview;
}

// ─── Local Storage Helpers ────────────────────────────────────────────────────
function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// ─── Flashcard Component ──────────────────────────────────────────────────────
function Flashcard({ card, index, total, flipped, onFlip }) {
  return (
    <div className="fc-scene">
      <div className={`fc-card-wrap${flipped ? ' flipped' : ''}`} onClick={onFlip}>
        <div className="fc-face fc-front">
          <span className="fc-label">Question</span>
          <span className="fc-counter">{index + 1} / {total}</span>
          <p className="fc-text">{card.front}</p>
        </div>
        <div className="fc-face fc-back">
          <span className="fc-label">Answer</span>
          <span className="fc-counter">{index + 1} / {total}</span>
          <p className="fc-text">{card.back}</p>
        </div>
      </div>
    </div>
  );
}

// ─── Study Screen ─────────────────────────────────────────────────────────────
function StudyScreen({ cards, progress, setProgress, onBack, onStartSubset, title }) {
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [graded, setGraded] = useState(false);
  const [sessionStats, setSessionStats] = useState({ correct: 0, incorrect: 0 });
  const [missedCards, setMissedCards] = useState([]);
  const [done, setDone] = useState(false);
  const [showMissed, setShowMissed] = useState(false);

  const card = cards[index];
  const pct = Math.round((index / cards.length) * 100);

  function grade(isCorrect) {
    const quality = isCorrect ? 2 : 0;
    const updated = getNextReview(progress[card.id], quality);
    setProgress(prev => ({ ...prev, [card.id]: updated }));
    if (isCorrect) {
      setSessionStats(s => ({ ...s, correct: s.correct + 1 }));
    } else {
      setSessionStats(s => ({ ...s, incorrect: s.incorrect + 1 }));
      setMissedCards(prev => [...prev, card]);
    }
    setGraded(true);
    setTimeout(() => {
      if (index + 1 >= cards.length) { setDone(true); }
      else { setIndex(i => i + 1); setFlipped(false); setGraded(false); }
    }, 350);
  }

  if (done) {
    return (
      <div className="container">
        <div className="complete-wrap animate-in">
          <div style={{fontSize:48, marginBottom:12}}>{String.fromCodePoint(0x1F389)}</div>
          <h2>Session Complete!</h2>
          <p>{title || 'All cards reviewed.'}</p>
          <div className="complete-stats">
            <div className="complete-stat">
              <div className="complete-stat-val" style={{color:'var(--green)'}}>{sessionStats.correct}</div>
              <div className="complete-stat-lbl">Correct</div>
            </div>
            <div className="complete-stat">
              <div className="complete-stat-val" style={{color:'var(--red)'}}>{sessionStats.incorrect}</div>
              <div className="complete-stat-lbl">Incorrect</div>
            </div>
            <div className="complete-stat">
              <div className="complete-stat-val">{cards.length}</div>
              <div className="complete-stat-lbl">Total</div>
            </div>
          </div>
          <div className="complete-actions">
            {missedCards.length > 0 && (
              <button className="btn btn-red btn-lg" onClick={() => onStartSubset(missedCards, 'Missed Cards')}>
                Study Missed ({missedCards.length})
              </button>
            )}
            <button className="btn btn-primary btn-lg" onClick={onBack}>Home</button>
          </div>
          {missedCards.length > 0 && (
            <div className="missed-list mt-8">
              <button className="btn btn-ghost btn-sm" onClick={() => setShowMissed(s => !s)} style={{marginBottom:12}}>
                {showMissed ? '&#x25B2; Hide' : '&#x25BC; Show'} missed cards
              </button>
              {showMissed && missedCards.map((c, i) => (
                <div key={c.id + i} className="missed-item animate-in">
                  <div className="q">Q: {c.front}</div>
                  <div className="a">A: {c.back}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="study-wrap">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>&#8592; Back</button>
          <div className="study-stats">
            <span>&#10003; <span className="correct">{sessionStats.correct}</span></span>
            <span>&#10007; <span className="incorrect">{sessionStats.incorrect}</span></span>
          </div>
        </div>
        <div className="study-progress-bar">
          <div className="study-progress-fill" style={{width: pct + '%'}} />
        </div>
        <Flashcard
          card={card}
          index={index}
          total={cards.length}
          flipped={flipped}
          onFlip={() => { if (!graded) setFlipped(f => !f); }}
        />
        {!flipped && !graded && (
          <p className="study-hint animate-in">Click card or tap Flip to reveal answer</p>
        )}
        {flipped && !graded && (
          <div className="study-controls animate-in">
            <button className="btn btn-outline btn-lg" style={{minWidth:80, justifyContent:'center'}} onClick={() => setFlipped(false)}>Flip</button>
            <button className="btn btn-red btn-lg" style={{minWidth:130, justifyContent:'center'}} onClick={() => grade(false)}>&#10007; Incorrect</button>
            <button className="btn btn-green btn-lg" style={{minWidth:130, justifyContent:'center'}} onClick={() => grade(true)}>&#10003; Correct</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Quiz Screen ──────────────────────────────────────────────────────────────
function QuizScreen({ cards, onBack }) {
  const [index, setIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const card = cards[index];

  const choices = React.useMemo(() => {
    const others = cards.filter(c => c.id !== card.id).map(c => c.back);
    const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
    return [...shuffled, card.back].sort(() => Math.random() - 0.5);
  }, [index, cards]);

  function pick(choice) {
    if (selected !== null) return;
    setSelected(choice);
    if (choice === card.back) setScore(s => s + 1);
  }

  function next() {
    if (index + 1 >= cards.length) { setDone(true); }
    else { setIndex(i => i + 1); setSelected(null); }
  }

  if (cards.length < 4) {
    return (
      <div className="container">
        <div className="complete-wrap">
          <p className="text-muted">Quiz mode needs at least 4 cards.</p>
          <button className="btn btn-primary mt-4" onClick={onBack}>Back</button>
        </div>
      </div>
    );
  }

  if (done) {
    const pct = Math.round((score / cards.length) * 100);
    return (
      <div className="container">
        <div className="complete-wrap animate-in">
          <div style={{fontSize:48, marginBottom:12}}>{pct >= 70 ? String.fromCodePoint(0x1F3C6) : String.fromCodePoint(0x1F4DD)}</div>
          <h2>Quiz Complete!</h2>
          <p>You scored {score} / {cards.length} ({pct}%)</p>
          <div className="complete-actions mt-4">
            <button className="btn btn-primary btn-lg" onClick={onBack}>Home</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="quiz-wrap">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}>&#8592; Back</button>
          <span className="text-muted" style={{fontSize:14}}>Score: {score} / {index}</span>
        </div>
        <div className="study-progress-bar mb-4">
          <div className="study-progress-fill" style={{width: Math.round((index/cards.length)*100) + '%'}} />
        </div>
        <div className="quiz-question animate-in">
          <small>Question {index + 1} of {cards.length}</small>
          <p>{card.front}</p>
        </div>
        <div className="quiz-choices">
          {choices.map((c, i) => {
            let cls = 'quiz-choice';
            if (selected !== null) {
              if (c === card.back) cls += ' correct';
              else if (c === selected) cls += ' wrong';
            }
            return (
              <button key={i} className={cls} onClick={() => pick(c)} disabled={selected !== null}>
                {c}
              </button>
            );
          })}
        </div>
        {selected !== null && (
          <>
            <div className={`quiz-feedback ${selected === card.back ? 'correct' : 'wrong'} animate-in`}>
              {selected === card.back ? '&#10003; Correct!' : '&#10007; Incorrect'}
            </div>
            <div className="quiz-next animate-in">
              <button className="btn btn-primary" onClick={next}>
                {index + 1 >= cards.length ? 'See Results' : 'Next &#8594;'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Admin Panel ──────────────────────────────────────────────────────────────
function AdminPanel({ cards, setCards, onBack, onLogout }) {
  const [front, setFront] = useState('');
  const [back, setBack] = useState('');
  const [editId, setEditId] = useState(null);
  const [msg, setMsg] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [token, setToken] = useState(() => loadJSON(STORAGE_KEYS.adminToken, ''));
  const [tokenInput, setTokenInput] = useState('');
  const [saving, setSaving] = useState(false);

  function flash(text, type='success') { setMsg({text, type}); setTimeout(() => setMsg(null), 4000); }

  async function pushCards(newCards) {
    if (!token) { flash('Set a GitHub token first (see setup below).', 'error'); return false; }
    setSaving(true);
    try {
      await pushCardsToGitHub(newCards, token);
      setCards(newCards);
      setSaving(false);
      return true;
    } catch(e) {
      flash('GitHub sync failed: ' + e.message, 'error');
      setSaving(false);
      return false;
    }
  }

  async function save() {
    if (!front.trim() || !back.trim()) return flash('Both fields required.', 'error');
    let newCards;
    if (editId) {
      newCards = cards.map(c => c.id === editId ? {...c, front: front.trim(), back: back.trim()} : c);
    } else {
      const id = 'card_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      newCards = [...cards, { id, front: front.trim(), back: back.trim() }];
    }
    const ok = await pushCards(newCards);
    if (ok) {
      flash(editId ? 'Card updated! Visible to all users.' : 'Card added! Visible to all users.');
      setFront(''); setBack(''); setEditId(null);
    }
  }

  async function del(id) {
    const newCards = cards.filter(c => c.id !== id);
    const ok = await pushCards(newCards);
    if (ok) flash('Card deleted.');
  }

  async function deleteAll() {
    const ok = await pushCards([]);
    if (ok) { setConfirmReset(false); flash('All cards deleted.'); }
  }

  function startEdit(card) { setEditId(card.id); setFront(card.front); setBack(card.back); }
  function cancelEdit() { setEditId(null); setFront(''); setBack(''); }

  function saveToken() {
    const t = tokenInput.trim();
    if (!t) return;
    saveJSON(STORAGE_KEYS.adminToken, t);
    setToken(t);
    setTokenInput('');
    flash('GitHub token saved on this device.');
  }

  return (
    <div className="container">
      <div className="admin-wrap">
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20}}>
          <h2 style={{fontSize:22, fontWeight:800}}>Admin Panel</h2>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={onBack}>&#8592; Back</button>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={onLogout}>Logout</button>
          </div>
        </div>
        {msg && <div className={`alert alert-${msg.type} animate-in`}>{msg.text}</div>}

        {/* GitHub Token Setup */}
        <div className="card" style={{marginBottom:16}}>
          <div className="section-title">GitHub Sync</div>
          {token ? (
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:8}}>
              <span style={{fontSize:13, color:'var(--green)'}}>&#10003; Token configured &#8212; cards sync to all users</span>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--red)', fontSize:12}} onClick={() => { saveJSON(STORAGE_KEYS.adminToken, ''); setToken(''); flash('Token removed.'); }}>Remove</button>
            </div>
          ) : (
            <div>
              <p style={{fontSize:13, color:'var(--text-muted)', marginBottom:10}}>Paste a GitHub Personal Access Token (with <strong>repo</strong> scope) to sync cards across all devices.</p>
              <div style={{display:'flex', gap:8}}>
                <input className="form-input" style={{flex:1}} type="password" value={tokenInput} onChange={e => setTokenInput(e.target.value)} placeholder="ghp_..." onKeyDown={e => e.key === 'Enter' && saveToken()} />
                <button className="btn btn-primary" onClick={saveToken}>Save Token</button>
              </div>
            </div>
          )}
        </div>

        <div className="card">
          <div className="section-title">{editId ? 'Edit Card' : 'Add Card'}</div>
          <div className="admin-form">
            <div className="form-group">
              <label className="form-label">Question (Front)</label>
              <textarea className="form-input" rows={3} value={front} onChange={e => setFront(e.target.value)} placeholder="Enter the question..." />
            </div>
            <div className="form-group">
              <label className="form-label">Answer (Back)</label>
              <textarea className="form-input" rows={3} value={back} onChange={e => setBack(e.target.value)} placeholder="Enter the answer..." />
            </div>
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : (editId ? 'Save Changes' : 'Add Card')}</button>
              {editId && <button className="btn btn-outline" onClick={cancelEdit}>Cancel</button>}
            </div>
          </div>
        </div>

        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:24, marginBottom:8}}>
          <div className="section-title" style={{marginBottom:0}}>All Cards ({cards.length})</div>
          {cards.length > 0 && (
            <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={() => setConfirmReset(true)}>
              Delete All
            </button>
          )}
        </div>
        {cards.length === 0 && <p className="text-muted" style={{fontSize:14}}>No cards yet. Add one above.</p>}
        <div className="card-list">
          {cards.map(c => (
            <div key={c.id} className="card-item">
              <div className="card-item-text">
                <div className="card-item-front">{c.front}</div>
                <div className="card-item-back">{c.back}</div>
              </div>
              <div className="card-item-actions">
                <button className="btn btn-outline btn-sm" onClick={() => startEdit(c)}>Edit</button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={() => del(c.id)} disabled={saving}>&#10005;</button>
              </div>
            </div>
          ))}
        </div>

        {confirmReset && (
          <div className="modal-overlay">
            <div className="modal-box animate-in">
              <h3>Delete All Cards?</h3>
              <p>This will remove all {cards.length} cards for everyone. This cannot be undone.</p>
              <div className="modal-actions">
                <button className="btn btn-outline" onClick={() => setConfirmReset(false)}>Cancel</button>
                <button className="btn btn-red" onClick={deleteAll} disabled={saving}>{saving ? 'Deleting...' : 'Delete All'}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Admin Login ──────────────────────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(false);
  function attempt() {
    if (pw === ADMIN_PASSWORD) { onLogin(); }
    else { setErr(true); setTimeout(() => setErr(false), 2000); }
  }
  return (
    <div className="container">
      <div className="login-wrap">
        <div className="login-box animate-in">
          <h2>Admin Login</h2>
          {err && <div className="alert alert-error mb-4">Incorrect password.</div>}
          <div className="form-group mb-4">
            <label className="form-label">Password</label>
            <input
              type="password"
              className="form-input"
              value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && attempt()}
              placeholder="Enter admin password"
              autoFocus
            />
          </div>
          <button className="btn btn-primary btn-full" onClick={attempt}>Login</button>
        </div>
      </div>
    </div>
  );
}

// ─── Home Screen ──────────────────────────────────────────────────────────────
function HomeScreen({ cards, progress, onStudy, onQuiz, onAdmin }) {
  const dueCount = cards.filter(c => isDue(progress[c.id])).length;
  const studied = cards.filter(c => progress[c.id]).length;
  const masteredCount = cards.filter(c => progress[c.id] && progress[c.id].reps >= 3).length;

  return (
    <div className="container">
      <div className="home-hero">
        <h1>Flashcards</h1>
        <p>Study smarter with spaced repetition</p>
      </div>

      <div className="card">
        <div className="section-title">Your Progress</div>
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          <div className="home-stat">
            <span className="home-stat-label">Total Cards</span>
            <span className="home-stat-value">{cards.length}</span>
          </div>
          <div className="home-stat">
            <span className="home-stat-label">Due for Review</span>
            <span className="home-stat-value" style={{color: dueCount > 0 ? 'var(--accent)' : 'var(--green)'}}>{dueCount}</span>
          </div>
          <div className="home-stat">
            <span className="home-stat-label">Studied</span>
            <span className="home-stat-value">{studied} / {cards.length}</span>
          </div>
          <div className="home-stat">
            <span className="home-stat-label">Mastered</span>
            <span className="home-stat-value" style={{color:'var(--green)'}}>{masteredCount}</span>
          </div>
        </div>
      </div>

      {cards.length === 0 ? (
        <div className="card mt-4 text-center">
          <p className="text-muted" style={{fontSize:15}}>No cards yet &#8212; an admin needs to add some!</p>
        </div>
      ) : (
        <div className="home-actions mt-4">
          <button className="btn btn-primary btn-full btn-lg" onClick={() => onStudy('all')}>
            &#128218; Study All Cards
          </button>
          {dueCount > 0 && (
            <button className="btn btn-outline btn-full btn-lg" onClick={() => onStudy('due')}>
              &#9200; Study Due Cards ({dueCount})
            </button>
          )}
          <button className="btn btn-outline btn-full btn-lg" onClick={onQuiz}>
            &#127919; Quiz Mode
          </button>
        </div>
      )}

      <div className="text-center mt-8">
        <button className="btn btn-ghost btn-sm" onClick={onAdmin} style={{color:'var(--text-muted)'}}>
          &#9881; Admin
        </button>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [cards, setCardsRaw] = useState(() => loadJSON(STORAGE_KEYS.cards, DEFAULT_CARDS));
  const [progress, setProgressRaw] = useState(() => loadJSON(STORAGE_KEYS.progress, {}));
  const [screen, setScreen] = useState('home');
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [studyCards, setStudyCards] = useState([]);
  const [studyTitle, setStudyTitle] = useState('');
  const [studyKey, setStudyKey] = useState(0);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | done | error

  // Fetch shared cards from GitHub on mount
  useEffect(() => {
    setSyncStatus('syncing');
    fetchRemoteCards().then(remote => {
      if (remote && Array.isArray(remote)) {
        setCardsRaw(remote);
        saveJSON(STORAGE_KEYS.cards, remote);
        setSyncStatus('done');
      } else {
        setSyncStatus('error');
      }
    });
  }, []);

  function setCards(val) {
    const v = typeof val === 'function' ? val(cards) : val;
    setCardsRaw(v);
    saveJSON(STORAGE_KEYS.cards, v);
  }

  function updateProgress(val) {
    const v = typeof val === 'function' ? val(progress) : val;
    setProgressRaw(v);
    saveJSON(STORAGE_KEYS.progress, v);
  }

  function handleStudy(mode) {
    let subset = cards;
    let title = 'All Cards';
    if (mode === 'due') {
      subset = cards.filter(c => isDue(progress[c.id]));
      title = 'Due Cards';
    }
    const shuffled = [...subset].sort(() => Math.random() - 0.5);
    setStudyCards(shuffled);
    setStudyTitle(title);
    setStudyKey(k => k + 1);
    setScreen('study');
  }

  function handleAdminClick() {
    if (adminAuthed) { setScreen('admin'); }
    else { setScreen('admin-login'); }
  }

  function handleAdminLogout() {
    setAdminAuthed(false);
    setScreen('home');
  }

  function handleAdminLogin() {
    setAdminAuthed(true);
    setScreen('admin');
  }

  return (
    <>
      <nav className="navbar">
        <div className="container navbar-inner">
          <div>
            <div className="navbar-brand">FlashCards</div>
            <div className="navbar-sub">adrianvon.dev</div>
          </div>
          {screen !== 'home' && (
            <button className="btn btn-ghost btn-sm" onClick={() => setScreen('home')}>Home</button>
          )}
        </div>
      </nav>

      {screen === 'home' && (
        <HomeScreen
          cards={cards}
          progress={progress}
          onStudy={handleStudy}
          onQuiz={() => setScreen('quiz')}
          onAdmin={handleAdminClick}
        />
      )}
      {screen === 'study' && (
        <StudyScreen
          key={studyKey}
          cards={studyCards}
          progress={progress}
          setProgress={updateProgress}
          onBack={() => setScreen('home')}
          title={studyTitle}
          onStartSubset={(subset, subTitle) => {
            const shuffled = [...subset].sort(() => Math.random() - 0.5);
            setStudyCards(shuffled);
            setStudyTitle(subTitle);
            setStudyKey(k => k + 1);
          }}
        />
      )}
      {screen === 'quiz' && (
        <QuizScreen
          cards={[...cards].sort(() => Math.random() - 0.5)}
          onBack={() => setScreen('home')}
        />
      )}
      {screen === 'admin-login' && (
        <AdminLogin onLogin={handleAdminLogin} />
      )}
      {screen === 'admin' && (
        <AdminPanel
          cards={cards}
          setCards={setCards}
          onBack={() => setScreen('home')}
          onLogout={handleAdminLogout}
        />
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
